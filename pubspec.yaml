name: agrilink_edge
description: >
  AgriLink Edge — Offline-first AI Agricultural Intelligence Platform for Africa.
  Built for smallholder farmers, AGRITEX extension officers,
  government analysts, NGOs, and researchers.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Rust Bridge
  flutter_rust_bridge: ^2.3.0

  # UI & Design
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # Localization
  intl: ^0.20.2

  # Data & Models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  equatable: ^2.0.5

  # Utilities
  logger: ^2.4.0
  uuid: ^4.4.2
  path_provider: ^2.1.3
  connectivity_plus: ^6.0.5
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.2
  device_info_plus: ^10.1.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

  # Linting
  flutter_lints: ^4.0.0
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.0

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/